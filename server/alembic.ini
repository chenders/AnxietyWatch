[alembic]
script_location = alembic
file_template = %%(rev)s_%%(slug)s

# Default URL for local dev (matches docker-compose port 5439).
# Overridden by DATABASE_URL env var in env.py — never used in production.
sqlalchemy.url = postgresql://anxietywatch:anxietywatch@localhost:5439/anxietywatch

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
