services:
  anxietywatch-db:
    image: postgres:16-alpine
    container_name: anxietywatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anxietywatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-anxietywatch}
    ports:
      - "127.0.0.1:5439:5432"
    volumes:
      - anxietywatch-pgdata:/var/lib/postgresql/data
    networks:
      - anxietywatch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anxietywatch}"]
      interval: 5s
      timeout: 3s
      retries: 5

  anxietywatch-app:
    image: ghcr.io/chenders/anxietywatch-server:latest
    build: .
    container_name: anxietywatch-app
    restart: unless-stopped
    depends_on:
      anxietywatch-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://anxietywatch:${POSTGRES_PASSWORD}@anxietywatch-db:5432/anxietywatch}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
    shm_size: "256mb"
    ports:
      - "0.0.0.0:8081:8080"
    networks:
      - anxietywatch-net

volumes:
  anxietywatch-pgdata:

networks:
  anxietywatch-net:
    driver: bridge
