# Production Docker Compose for AnxietyWatch sync server.
# Deployed to /opt/anxietywatch/docker-compose.yml by the GitHub Actions workflow.
#
# For local development, use docker-compose.yml instead.

services:
  anxietywatch-db:
    image: postgres:16-alpine
    container_name: anxietywatch-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-anxietywatch}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-anxietywatch}
    ports:
      - "127.0.0.1:5439:5432"
    volumes:
      - anxietywatch-pgdata:/var/lib/postgresql/data
    networks:
      - anxietywatch-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-anxietywatch}"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  anxietywatch-app:
    image: ghcr.io/chenders/anxietywatch-server:latest
    container_name: anxietywatch-app
    restart: unless-stopped
    depends_on:
      anxietywatch-db:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://anxietywatch:${POSTGRES_PASSWORD}@anxietywatch-db:5432/anxietywatch}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set ADMIN_PASSWORD in .env}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in .env}
      GRAPHQL_API_KEY: ${GRAPHQL_API_KEY:-}
    ports:
      - "0.0.0.0:8081:8080"
    networks:
      - anxietywatch-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health', timeout=3).close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 64M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  anxietywatch-pgdata:

networks:
  anxietywatch-net:
    driver: bridge
