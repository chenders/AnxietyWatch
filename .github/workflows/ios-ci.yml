name: iOS CI

on:
  push:
    branches: [main]
    paths-ignore: [server/**, docs/**, '*.md']
  pull_request:
    paths-ignore: [server/**, docs/**, '*.md']

concurrency:
  group: ios-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: macos-15
    continue-on-error: true  # Xcode 26 not yet available on GitHub-hosted runners
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_26.app || sudo xcode-select -s "$(ls -d /Applications/Xcode*.app | tail -1)"

      - name: Find simulator destination
        id: dest
        run: |
          # List available iPhone simulators and pick the first one
          SIM_NAME=$(xcrun simctl list devices available -j \
            | python3 -c "import sys,json; devs=json.load(sys.stdin)['devices']; print(next(d['name'] for rt in devs for d in devs[rt] if 'iPhone' in d['name'] and d['isAvailable']), end='')" 2>/dev/null)
          if [ -z "$SIM_NAME" ]; then
            SIM_NAME="iPhone 16 Pro"
          fi
          echo "sim_name=$SIM_NAME" >> "$GITHUB_OUTPUT"
          echo "Using simulator: $SIM_NAME"

      - name: Run tests with coverage
        run: |
          xcodebuild test \
            -scheme AnxietyWatch \
            -destination 'platform=iOS Simulator,name=${{ steps.dest.outputs.sim_name }}' \
            -enableCodeCoverage YES \
            -resultBundlePath TestResults.xcresult \
            -quiet

      - name: Report coverage
        if: always()
        run: |
          echo "## Code Coverage" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          xcrun xccov view --report TestResults.xcresult 2>/dev/null | grep -E "^AnxietyWatch\.app" >> $GITHUB_STEP_SUMMARY || echo "Coverage data not available" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
