name: CI

on:
  workflow_call:
  push:
    branches: [main, master]
    paths: [server/**, .github/workflows/ci.yml]
  pull_request:
    branches: [main, master]
    paths: [server/**, .github/workflows/ci.yml]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 server/ --max-line-length=120 --exclude=__pycache__

  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: anxietywatch
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: anxietywatch_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U anxietywatch"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    env:
      DATABASE_URL: postgresql://anxietywatch:testpass@localhost:5432/anxietywatch_test
      TEST_DATABASE_URL: postgresql://anxietywatch:testpass@localhost:5432/anxietywatch_test
      ADMIN_PASSWORD: testpass
      SECRET_KEY: test-secret
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r server/requirements.txt
      - run: cd server && python -m pytest tests/ -v

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: server
          push: false
          tags: anxietywatch-server:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
