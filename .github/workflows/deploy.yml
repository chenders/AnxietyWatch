name: Deploy

on:
  push:
    branches: [main, master]
    paths: [server/**, .github/workflows/deploy.yml]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ghcr.io/chenders/anxietywatch-server:latest
            ghcr.io/chenders/anxietywatch-server:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        working-directory: server
        run: |
          echo "ADMIN_PASSWORD=${{ secrets.ANXIETYWATCH_ADMIN_PASSWORD }}" > .env
          echo "SECRET_KEY=${{ secrets.ANXIETYWATCH_SECRET_KEY }}" >> .env
          echo "POSTGRES_USER=anxietywatch" >> .env
          echo "POSTGRES_PASSWORD=${{ secrets.ANXIETYWATCH_DB_PASSWORD }}" >> .env
          echo "POSTGRES_DB=anxietywatch" >> .env
          echo "DATABASE_URL=postgresql://anxietywatch:${{ secrets.ANXIETYWATCH_DB_PASSWORD }}@anxietywatch-db:5432/anxietywatch" >> .env

      - name: Pull and deploy
        working-directory: server
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps
