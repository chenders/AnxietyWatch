name: Deploy

on:
  push:
    branches: [main, master]
    paths: [server/**, .github/workflows/deploy.yml]

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ghcr.io/chenders/anxietyscope-server:latest
            ghcr.io/chenders/anxietyscope-server:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Write .env
        working-directory: server
        run: |
          cat > .env <<EOF
          ADMIN_PASSWORD=${{ secrets.ANXIETYSCOPE_ADMIN_PASSWORD }}
          SECRET_KEY=${{ secrets.ANXIETYSCOPE_SECRET_KEY }}
          POSTGRES_USER=anxietyscope
          POSTGRES_PASSWORD=${{ secrets.ANXIETYSCOPE_DB_PASSWORD }}
          POSTGRES_DB=anxietyscope
          DATABASE_URL=postgresql://anxietyscope:${{ secrets.ANXIETYSCOPE_DB_PASSWORD }}@anxietyscope-db:5432/anxietyscope
          EOF

      - name: Pull and deploy
        working-directory: server
        run: |
          docker compose pull
          docker compose up -d --remove-orphans
          docker compose ps
