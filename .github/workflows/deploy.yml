name: Deploy

on:
  push:
    branches: [main, master]
    paths: [server/**, .github/workflows/deploy.yml, docker-compose.runners.yml, .env.runners.example]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: server
          push: true
          tags: |
            ghcr.io/chenders/anxietywatch-server:latest
            ghcr.io/chenders/anxietywatch-server:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: anxietywatch
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Copy production configs
        run: |
          cp ${{ github.workspace }}/server/docker-compose.prod.yml /opt/anxietywatch/docker-compose.yml

      - name: Write .env
        run: |
          cat > /opt/anxietywatch/.env << 'EOF'
          ADMIN_PASSWORD=${{ secrets.ANXIETYWATCH_ADMIN_PASSWORD }}
          SECRET_KEY=${{ secrets.ANXIETYWATCH_SECRET_KEY }}
          POSTGRES_USER=anxietywatch
          POSTGRES_PASSWORD=${{ secrets.ANXIETYWATCH_DB_PASSWORD }}
          POSTGRES_DB=anxietywatch
          DATABASE_URL=postgresql://anxietywatch:${{ secrets.ANXIETYWATCH_DB_PASSWORD }}@anxietywatch-db:5432/anxietywatch
          EOF
          chmod 600 /opt/anxietywatch/.env

      - name: Pull and deploy
        working-directory: /opt/anxietywatch
        run: |
          docker compose pull
          docker compose up -d --remove-orphans --wait --wait-timeout 60

      - name: Verify health
        run: |
          # Check container health status (curl can't reach host ports from inside the runner container)
          ATTEMPTS=0
          MAX_ATTEMPTS=15
          while [ $ATTEMPTS -lt $MAX_ATTEMPTS ]; do
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' anxietywatch-app 2>/dev/null || echo "missing")
            if [ "$STATUS" = "healthy" ]; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $((ATTEMPTS + 1)): status=$STATUS"
            ATTEMPTS=$((ATTEMPTS + 1))
            sleep 2
          done

          if [ $ATTEMPTS -eq $MAX_ATTEMPTS ]; then
            echo "Health check failed after 30s (status: $STATUS)"
            docker compose -f /opt/anxietywatch/docker-compose.yml logs --tail=50
            exit 1
          fi

          docker compose -f /opt/anxietywatch/docker-compose.yml ps

      - name: Cleanup old images
        run: docker image prune -f --filter "until=24h"
        continue-on-error: true
