<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: transparent; display: flex; justify-content: center; padding: 20px; }
  .iphone-frame { width: 280px; height: 580px; background: #000; border-radius: 36px; padding: 12px; }
  .iphone-screen { width: 100%; height: 100%; background: #0a0a0a; border-radius: 26px; overflow: hidden; display: flex; flex-direction: column; }
  .ios-status-bar { display: flex; justify-content: space-between; align-items: center; padding: 8px 20px 4px; font-size: 10px; font-weight: 600; color: #fff; flex-shrink: 0; position: relative; }
  .notch { width: 80px; height: 22px; background: #000; border-radius: 0 0 14px 14px; position: absolute; top: 0; left: 50%; transform: translateX(-50%); }
  .ios-nav { padding: 6px 16px 10px; flex-shrink: 0; }
  .ios-nav-title { font-size: 22px; font-weight: 700; color: #fff; }
  .ios-content { flex: 1; overflow: hidden; padding: 0 12px 12px; }
  .chart-area { background: rgba(255,255,255,0.04); border-radius: 12px; padding: 12px; margin-bottom: 8px; }
  .chart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .chart-title { font-size: 13px; font-weight: 600; color: #fff; }
  .chart-period { display: flex; background: rgba(255,255,255,0.08); border-radius: 6px; overflow: hidden; }
  .chart-period span { font-size: 8px; padding: 3px 8px; color: #666; }
  .chart-period span.active { background: rgba(255,255,255,0.15); color: #fff; font-weight: 600; }
</style>
</head>
<body>

    <div class="ios-content">

        </div>

          <line x1="22" y1="117" x2="252" y2="117" stroke="#222" stroke-width="0.5"/>
          <rect x="22" y="36" width="230" height="30" fill="#007aff" opacity="0.08" rx="2"/>
          <line x1="22" y1="49" x2="252" y2="49" stroke="#007aff" stroke-width="0.8" stroke-dasharray="4,3" opacity="0.4"/>
          <path d="M26,42 L38,46 L50,38 L62,52 L74,44 L86,40 L98,48 L110,36 L122,50 L134,56 L146,62 L158,70 L170,58 L182,66 L194,72 L206,80 L218,76 L230,84 L242,78 L252,82" stroke="#007aff" stroke-width="2" fill="none"/>

            <rect x="60" y="18" width="14" height="6" fill="#5e5ce6" rx="1"/><rect x="60" y="24" width="14" height="4" fill="#30d158" rx="1"/><rect x="60" y="28" width="14" height="14" fill="#007aff" rx="1"/><rect x="60" y="42" width="14" height="8" fill="#ff9500" rx="1"/>
          </g>

          <rect x="150" y="10" width="6" height="6" fill="#30d158" rx="1"/><text x="159" y="16" font-size="6" fill="#888" font-family="Inter,sans-serif">REM</text>
          <rect x="178" y="10" width="6" height="6" fill="#007aff" rx="1"/><text x="187" y="16" font-size="6" fill="#888" font-family="Inter,sans-serif">Core</text>
          <rect x="210" y="10" width="6" height="6" fill="#ff9500" rx="1"/><text x="219" y="16" font-size="6" fill="#888" font-family="Inter,sans-serif">Awake</text>

      </div>
    </div>
  </div>
</div>
</body>
</html>
