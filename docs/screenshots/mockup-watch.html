<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', -apple-system, sans-serif; background: transparent; display: flex; justify-content: center; padding: 20px; }
  .watch-frame { width: 180px; height: 220px; background: #1c1c1e; border-radius: 40px; padding: 8px; position: relative; }
  .watch-frame::after { content: ''; position: absolute; right: -10px; top: 50%; transform: translateY(-50%); width: 6px; height: 40px; background: #333; border-radius: 0 3px 3px 0; }
  .watch-screen { width: 100%; height: 100%; background: #000; border-radius: 34px; overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 16px; }
  .watch-label { font-size: 11px; color: #888; }
  .watch-severity { font-size: 56px; font-weight: 700; color: #ff9500; line-height: 1; }
  .watch-context { font-size: 9px; color: #555; margin-top: 8px; }
  .watch-button { margin-top: 12px; background: #ff9500; color: #000; font-weight: 700; font-size: 13px; border: none; border-radius: 18px; padding: 8px 32px; font-family: inherit; }
</style>
</head>
<body>
<div class="watch-frame">
  <div class="watch-screen">
    <div class="watch-label">How are you feeling?</div>
    <div class="watch-severity">7</div>
    <div class="watch-context">Last: 5, 3 hours ago</div>
    <button class="watch-button">Log</button>
  </div>
</div>
</body>
</html>
