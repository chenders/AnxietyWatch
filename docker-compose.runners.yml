# GitHub Actions Self-Hosted Runner (Docker)
#
# Runs a single ephemeral GitHub Actions runner for AnxietyWatch deployments.
# Uses the myoung34/github-runner image with ephemeral mode.
#
# IMPORTANT: Create a .env file in /opt/github-runners-anxietywatch/ with:
#   ACCESS_TOKEN=your_personal_access_token
#   REPO_URL=https://github.com/chenders/AnxietyWatch
#
# Usage:
#   Start:   docker compose up -d
#   Stop:    docker compose down
#   Logs:    docker compose logs -f
#   Status:  docker compose ps
#
# See: docs/SERVER_SETUP.md for complete instructions

services:
  runner-1:
    image: myoung34/github-runner:latest
    container_name: anxietywatch-runner-1
    restart: unless-stopped
    environment:
      - RUNNER_WORKDIR=/tmp/github-runner
      - RUNNER_SCOPE=repo
      # Use 'anxietywatch' label only (not 'self-hosted') to prevent other repos'
      # jobs from being routed here. Deadonfilm uses runs-on: self-hosted.
      - LABELS=anxietywatch
      - EPHEMERAL=true
      - DISABLE_AUTO_UPDATE=true
    env_file:
      - .env
    volumes:
      # Docker socket for pulling images and running compose in CI.
      # SECURITY: Only trusted branches should run on this runner.
      - /var/run/docker.sock:/var/run/docker.sock
      # App directory for deployment workflows.
      - /opt/anxietywatch:/opt/anxietywatch
    extra_hosts:
      - "host.docker.internal:host-gateway"
    security_opt:
      - label:disable
    tmpfs:
      - /tmp:size=1G,exec
    deploy:
      resources:
        limits:
          memory: 2048M
          cpus: '2'
        reservations:
          memory: 256M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f Runner.Listener || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - runner-network

networks:
  runner-network:
    driver: bridge
