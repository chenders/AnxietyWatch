# SwiftLint configuration for AnxietyWatch
# Focus: catch unused code, not style nitpicks

included:
  - AnxietyWatch
  - AnxietyWatchTests

excluded:
  - AnxietyWatch Watch App
  - AnxietyWatchWidgets

# Only enable rules that catch real problems
# Disable noisy style rules that don't prevent bugs
disabled_rules:
  - trailing_comma
  - trailing_newline
  - implicit_optional_initialization
  - type_body_length
  - file_length
  - function_body_length
  - large_tuple
  - cyclomatic_complexity
  - nesting
  - force_try        # acceptable in date formatters and tests
  - force_cast       # acceptable in tests
  - statement_position
  - for_where

# Allow short variable names common in SwiftUI (rx, p, c, etc.)
identifier_name:
  min_length:
    warning: 1
    error: 0
  excluded:
    - id

# Match project style — 150 chars is reasonable for SwiftUI
line_length:
  warning: 150
  error: 200
  ignores_comments: true
  ignores_urls: true

# Function parameter count — SwiftUI views often have many
function_parameter_count:
  warning: 8
  error: 12
